      validate: (item, logs = []) => {
        if (!item) {
          logs.push("⚠️ Rilevato record nullo o indefinito. Escluso.");
          return false;
        }

        const nome = item.nome || "";
        
        // Check for sub-totals or totals
        if (
          nome.toLowerCase().includes("totale") || 
          nome.toLowerCase().includes("subtotale") || 
          nome.toLowerCase().includes("summary")
        ) {
          logs.push(`⚠️ Ho escluso la riga "${nome}" (ID: ${item.id}) perché è un subtotale o totale di riepilogo.`);
          return false;
        }

        // Check if value is null
        if (item.valore === undefined || item.valore === null) {
          logs.push(`⚠️ Ho escluso il record "${nome}" (ID: ${item.id}) perché privo di valore attuale.`);
          return false;
        }

        // Check if value is zero (reimbursed)
        if (parseFloat(item.valore) === 0) {
          logs.push(`ℹ️ Ho escluso la riga "${nome}" (ID: ${item.id}) perché il valore attuale è zero (rimborsato/dismesso).`);
          return false;
        }

        // Check numeric validity
        if (isNaN(item.investito) || isNaN(item.valore)) {
          logs.push(`⚠️ Ho escluso il record "${nome}" (ID: ${item.id}) per ambiguità nei dati numerici (NaN).`);
          return false;
        }

        if (item.investito < 0 || item.valore < 0) {
          logs.push(`⚠️ Ho escluso il record "${nome}" (ID: ${item.id}) perché presenta valori monetari negativi.`);
          return false;
        }

        return true;

          logs.push("❌ Errore critico: I dati in ingresso non sono in formato Array.");
          return { active: [], logs, errors: ["I dati in ingresso devono essere un array."] };
        }

        data.forEach(item => {
          const isValid = FinanceAgent.validate(item, logs);
          if (!isValid) return;

          // Proportional scaling for partial reimbursements
          const investitoOriginale = item.investitoOriginale !== undefined ? item.investitoOriginale : item.investito;
          let investitoResiduo = investitoOriginale;
          if (item.quoteOriginali && item.quote !== null && item.quoteOriginali > 0) {
            const quoteAttuali = item.quote;
            const quoteOriginali = item.quoteOriginali;
            const ratio = quoteAttuali / quoteOriginali;
            investitoResiduo = investitoOriginale * ratio;
            
            // Precise rounding to cent
            investitoResiduo = Math.round((investitoResiduo + Number.EPSILON) * 100) / 100;

          // Calculations precise to the cent
          const plus = Math.round((item.valore - investitoResiduo + Number.EPSILON) * 100) / 100;
          const pct = investitoResiduo > 0 ? (plus / investitoResiduo) * 100 : 0;

          active.push({
            ...item,
            investitoOriginale,
            investito: investitoResiduo,
            plus,
            pct
          });
        });

        logs.push(`✅ FinanceAgent: Elaborazione completata con successo. Titoli attivi: ${active.length}/${data.length}.`);

    const Donut = ({ data, size = 180 }) => {
      const cx = size / 2;
      const cy = size / 2;
      const outerRadius = size * 0.36;
      const innerRadius = size * 0.22;

      const validData = data.filter(d => d.value > 0);
      const total = validData.reduce((sum, d) => sum + d.value, 0);

      if (total === 0) {
        return (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: size, color: 'var(--muted)', fontSize: '13px' }}>
            Nessun dato attivo
          </div>
        );
      }

      let accumulatedAngle = 0;

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '20px', width: '100%' }}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
            {validData.map((item, index) => {
              const pct = item.value / total;
              const angle = pct * 360;
              const startAngle = accumulatedAngle;
              const endAngle = accumulatedAngle + angle;
              accumulatedAngle = endAngle;

              const drawAngle = angle >= 360 ? 359.99 : angle;
              const radStart = (startAngle - 90) * Math.PI / 180;
              const radEnd = (startAngle + drawAngle - 90) * Math.PI / 180;

              const x1_out = cx + outerRadius * Math.cos(radStart);
              const y1_out = cy + outerRadius * Math.sin(radStart);
              const x2_out = cx + outerRadius * Math.cos(radEnd);
              const y2_out = cy + outerRadius * Math.sin(radEnd);

              const x1_in = cx + innerRadius * Math.cos(radStart);
              const y1_in = cy + innerRadius * Math.sin(radStart);
              const x2_in = cx + innerRadius * Math.cos(radEnd);
              const y2_in = cy + innerRadius * Math.sin(radEnd);

              const largeArc = drawAngle > 180 ? 1 : 0;

              const pathData = `
                M ${x1_out} ${y1_out}
                A ${outerRadius} ${outerRadius} 0 ${largeArc} 1 ${x2_out} ${y2_out}
                L ${x2_in} ${y2_in}
                A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${x1_in} ${y1_in}
                Z
              `;

              return (
                <path
                  key={index}
                  d={pathData}
                  fill={item.color}
                  stroke="var(--card)"
                  strokeWidth="1.5"
                  style={{ transition: 'var(--transition)' }}
                >
                  <title>{item.label}: {fmtEUR(item.value)} ({(pct*100).toFixed(1)}%)</title>
                </path>
              );

            </text>

          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', width: '100%' }}>
            {validData.map((item, index) => {
              const pct = (item.value / total) * 100;
              return (
                <div key={index} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: '13px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span style={{ width: '10px', height: '10px', borderRadius: '3px', backgroundColor: item.color }} />
